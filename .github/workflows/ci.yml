name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory:"./TestResults"

      - name: Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"coverage-report" -reporttypes:"MarkdownSummaryGithub;Cobertura"

      - name: Publish coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage-report/SummaryGithub.md ]; then
            cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          elif ls coverage-report/*.md 1>/dev/null 2>&1; then
            cat coverage-report/*.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
